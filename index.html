<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wahyu Gustian | Tactical Portfolio v4.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { background-color: #0a0a0a; color: #e2e8f0; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #FACC15; border-radius: 10px; }
        .mix-blend-difference { mix-blend-mode: difference; }
        #root:empty::before {
            content: "INITIALIZING COMMAND CENTER...";
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #FACC15; font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.5em; animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
        .text-glow { text-shadow: 0 0 20px rgba(250, 204, 21, 0.3); }
        .vertical-text { writing-mode: vertical-rl; text-orientation: mixed; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const motion = window.Motion.motion;
        const AnimatePresence = window.Motion.AnimatePresence;

        // --- BANK KALIMAT TAKTIS ---
        const sentenceBank = {
            LOW: ["Memerlukan pengawasan intensif.", "Kapasitas terbatas pada tugas dasar.", "Rentan dalam situasi tekanan tinggi.", "Perlu bimbingan teknis berkelanjutan."],
            MEDIUM: ["Performa stabil standar lapangan.", "Kepatuhan moderat pada instruksi.", "Potensi pengembangan koordinasi unit.", "Efektif sebagai personel pendukung."],
            HIGH: ["Kapasitas operasional luar biasa.", "Handal dalam keputusan taktis berat.", "Integritas dan loyalitas mutlak.", "Aset elit pemimpin unit mandiri."],
            MAX: ["Level performa puncak elit.", "Adaptasi eksekusi jenius taktis.", "Dominasi mutlak aspek strategis.", "Operator level S insting sempurna."]
        };

        // --- Components ---
        const Icon = ({ name, className }) => {
            useEffect(() => { if(window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        const GridReveal = ({ onComplete }) => (
            <div className="fixed inset-0 z-[200] pointer-events-none grid grid-cols-4 md:grid-cols-8 grid-rows-8">
                {[...Array(64)].map((_, i) => (
                    <motion.div key={i} initial={{ opacity: 1 }} animate={{ opacity: 0 }} transition={{ duration: 0.5, delay: Math.random() * 0.8 }} onAnimationComplete={i === 0 ? onComplete : undefined} className="bg-[#FACC15]/10 border border-[#FACC15]/5" />
                ))}
            </div>
        );

        // --- MAGIC CIRCLE ENGINE ---
        const MagicCircle = ({ type }) => {
            // Tipe 0: The Chrono Ring (Triple Rotating Rings)
            if (type === 0) return (
                <div className="absolute inset-0 flex items-center justify-center overflow-hidden pointer-events-none opacity-30">
                    <div className="relative w-[600px] h-[600px] flex items-center justify-center">
                        <motion.div animate={{ rotate: 360 }} transition={{ duration: 25, repeat: Infinity, ease: "linear" }} className="absolute inset-0 border border-dashed border-[#FACC15] rounded-full" />
                        <motion.div animate={{ rotate: -360 }} transition={{ duration: 20, repeat: Infinity, ease: "linear" }} className="absolute inset-12 border-2 border-[#FACC15]/40 rounded-full" />
                        <motion.div animate={{ rotate: 360 }} transition={{ duration: 15, repeat: Infinity, ease: "linear" }} className="absolute inset-24 border border-[#FACC15]/60 rounded-full border-t-4 shadow-[0_0_30px_rgba(250,204,21,0.2)]" />
                    </div>
                </div>
            );
            // Tipe 1: The Rune Array (Orbiting Squares)
            if (type === 1) return (
                <div className="absolute inset-0 flex items-center justify-center overflow-hidden pointer-events-none opacity-25">
                    <motion.div animate={{ rotate: 360 }} transition={{ duration: 40, repeat: Infinity, ease: "linear" }} className="relative w-[550px] h-[550px]">
                        <div className="absolute inset-0 border border-[#FACC15]/20 rounded-full" />
                        {[...Array(8)].map((_, i) => (
                            <motion.div key={i} style={{ rotate: `${i * 45}deg` }} className="absolute inset-0 flex justify-center">
                                <div className="w-4 h-4 bg-[#FACC15] rounded-sm mt-[-8px] shadow-[0_0_15px_#FACC15]" />
                            </motion.div>
                        ))}
                        <div className="absolute inset-16 border border-dashed border-[#FACC15]/30 rounded-full" />
                    </motion.div>
                </div>
            );
            // Tipe 2: The HUD Core (Segmented Glow Circle)
            if (type === 2) return (
                <div className="absolute inset-0 flex items-center justify-center overflow-hidden pointer-events-none opacity-40">
                    <div className="relative w-[500px] h-[500px]">
                        <motion.div animate={{ rotate: 360 }} transition={{ duration: 8, repeat: Infinity, ease: "linear" }} className="absolute inset-0 border-[12px] border-transparent border-t-[#FACC15] border-b-[#FACC15] rounded-full blur-[1px] shadow-[0_0_40px_rgba(250,204,21,0.3)]" />
                        <motion.div animate={{ rotate: -360 }} transition={{ duration: 12, repeat: Infinity, ease: "linear" }} className="absolute inset-6 border border-[#FACC15]/20 rounded-full" />
                        <motion.div animate={{ scale: [1, 1.1, 1] }} transition={{ duration: 3, repeat: Infinity }} className="absolute inset-[40%] bg-[#FACC15]/10 rounded-full shadow-[0_0_60px_#FACC15]" />
                    </div>
                </div>
            );
            // Tipe 3: The Hex-Pulse (Geometric Pulse)
            return (
                <div className="absolute inset-0 flex items-center justify-center overflow-hidden pointer-events-none opacity-20">
                    {[...Array(3)].map((_, i) => (
                        <motion.div key={i} initial={{ scale: 0.5, opacity: 0 }} animate={{ scale: [0.5, 1.8], opacity: [0, 1, 0] }} transition={{ duration: 5, repeat: Infinity, delay: i * 1.5, ease: "easeInOut" }} className="absolute w-[600px] h-[600px] border-2 border-[#FACC15] rotate-45" />
                    ))}
                    <div className="absolute w-[300px] h-[300px] border border-[#FACC15]/30 rounded-full animate-pulse" />
                </div>
            );
        };

        const HomePage = ({ animType, setPage }) => (
            <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} className="min-h-screen flex flex-col items-center justify-center max-w-7xl mx-auto px-8 relative">
                <MagicCircle type={animType} />
                
                {/* Tactical Corner Accents */}
                <div className="hidden lg:block absolute inset-0 pointer-events-none">
                    <div className="absolute top-20 left-20 w-32 h-32 border-t-2 border-l-2 border-[#FACC15]/20" />
                    <div className="absolute top-20 right-20 w-32 h-32 border-t-2 border-r-2 border-[#FACC15]/20" />
                    <div className="absolute bottom-20 left-20 w-32 h-32 border-b-2 border-l-2 border-[#FACC15]/20" />
                    <div className="absolute bottom-20 right-20 w-32 h-32 border-b-2 border-r-2 border-[#FACC15]/20" />
                </div>

                <div className="text-center space-y-8 relative z-10">
                    <motion.div initial={{ y: 20, opacity: 0 }} animate={{ y: 0, opacity: 1 }} transition={{ delay: 0.2 }} className="flex flex-col items-center gap-4">
                        <div className="flex items-center gap-4">
                            <div className="w-12 h-[1px] bg-[#FACC15]/50" />
                            <p className="text-[12px] font-mono text-[#FACC15] uppercase tracking-[0.8em] font-bold text-glow">Portfolio v3.0</p>
                            <div className="w-12 h-[1px] bg-[#FACC15]/50" />
                        </div>
                        
                        <h2 className="text-7xl md:text-9xl font-black text-white uppercase tracking-tighter leading-none text-glow">
                            WAHYU<br />
                            <span className="text-[#FACC15]">GUSTIAN</span>
                        </h2>
                        
                        <motion.p initial={{ opacity: 0 }} animate={{ opacity: 1 }} transition={{ delay: 0.5 }} className="text-gray-400 text-[10px] md:text-xs font-mono uppercase tracking-[0.3em] max-w-xl mx-auto mt-6 leading-relaxed">
                            Adaptasi cepat dengan integritas mutlak, mengotomatisasi keamanan melalui ketangguhan fisik dan mental.
                        </motion.p>
                    </motion.div>

                    <motion.div initial={{ y: 30, opacity: 0 }} animate={{ y: 0, opacity: 1 }} transition={{ delay: 0.8 }} className="grid grid-cols-1 md:grid-cols-3 gap-6 pt-16 max-w-5xl mx-auto">
                        {[
                            { label: 'Field Records', page: 'experience', icon: 'briefcase' },
                            { label: 'Tactical Tools', page: 'audit', icon: 'clipboard-check' },
                            { label: 'Bio & Contact', page: 'profile', icon: 'user' }
                        ].map((item, i) => (
                            <button 
                                key={i} 
                                onClick={() => setPage(item.page)}
                                className="bg-[#1a1a1a]/40 backdrop-blur-md border border-white/5 p-8 rounded-xl hover:border-[#FACC15] hover:bg-[#FACC15]/5 transition-all group relative overflow-hidden text-left"
                            >
                                <div className="flex items-center justify-between mb-6">
                                    <Icon name={item.icon} className="w-6 h-6 text-[#FACC15] group-hover:scale-110 transition-transform" />
                                    <div className="w-2 h-2 bg-white/10 rounded-full group-hover:bg-[#FACC15] animate-pulse" />
                                </div>
                                <p className="text-white font-black uppercase tracking-[0.2em] text-sm mb-4 group-hover:text-[#FACC15] transition-colors">{item.label}</p>
                                <div className="h-[2px] w-full bg-white/5 overflow-hidden">
                                    <motion.div 
                                        animate={{ x: ['-100%', '100%'] }} 
                                        transition={{ duration: 3, repeat: Infinity, delay: i * 0.5 }} 
                                        className="h-full w-1/2 bg-[#FACC15]/40" 
                                    />
                                </div>
                            </button>
                        ))}
                    </motion.div>
                </div>
            </motion.div>
        );

        const ExperiencePage = ({ setPage }) => (
            <motion.div initial={{ opacity: 0, x: -50 }} animate={{ opacity: 1, x: 0 }} exit={{ opacity: 0, x: 50 }} className="min-h-screen py-32 max-w-5xl mx-auto px-8 relative">
                <MagicCircle type={1} /> {/* Rune Array for Experience */}
                
                <button onClick={() => setPage('home')} className="fixed top-8 right-8 z-[100] flex items-center gap-2 text-[#FACC15] font-mono text-[10px] uppercase tracking-widest hover:scale-105 transition-all bg-black/50 p-3 rounded-lg border border-[#FACC15]/20 backdrop-blur-md">
                    <Icon name="arrow-left" className="w-4 h-4" /> Return to Center
                </button>
                
                <div className="relative z-10 space-y-12">
                    <div className="flex items-end gap-4">
                        <h2 className="text-5xl font-black text-white uppercase tracking-tighter leading-none">FIELD<br /><span className="text-[#FACC15]">RECORDS</span></h2>
                        <div className="h-1 flex-grow bg-gray-800 mb-2" />
                    </div>
                    <div className="space-y-12">
                        {[
                            { title: "Helper Mesin Fanuc", company: "PT Biggy Cemerlang", year: "2025 — 2026", desc: "Manajemen output produk mesin injection Fanuc. Packing presisi dan kontrol kualitas." },
                            { title: "Satpam Pengawalan Teknisi ATM", company: "PT Kejar", year: "2022 — 2023", desc: "Pengawalan teknisi ATM trouble dan sterilisasi area operasional." },
                            { title: "Crew Store", company: "Alfamart", year: "2020 — 2021", desc: "Manajemen operasional toko dan kontrol inventori." },
                            { title: "Urban Logistics (Ojol)", company: "Grab Indonesia", year: "2018 — 2023", desc: "Operasi logistik perkotaan (Side Mission)." }
                        ].map((exp, i) => (
                            <div key={i} className="group relative pl-12 border-l border-gray-800">
                                <div className="absolute -left-[5px] top-0 w-2 h-2 bg-[#FACC15] rounded-full group-hover:scale-150 transition-transform" />
                                <div className="space-y-2">
                                    <div className="flex justify-between items-start">
                                        <div><h3 className="text-2xl font-bold text-white uppercase">{exp.title}</h3><p className="text-[#FACC15] font-mono text-xs uppercase">{exp.company}</p></div>
                                        <span className="text-[10px] font-mono text-gray-500 uppercase">{exp.year}</span>
                                    </div>
                                    <p className="text-gray-400 text-sm leading-relaxed max-w-xl italic">"{exp.desc}"</p>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            </motion.div>
        );

        const AuditToolPage = ({ setPage }) => {
            const [scanName, setScanName] = useState('');
            const [isScanning, setIsScanning] = useState(false);
            const [scanResult, setScanResult] = useState(null);
            const [isAnalyzing, setIsAnalyzing] = useState(false);

            const handleScan = () => {
                if (!scanName) return;
                setIsScanning(true);
                setTimeout(() => {
                    const levels = ['LOW', 'MEDIUM', 'HIGH', 'MAX'];
                    const initialStats = ['Integrity', 'Discipline', 'Strength', 'Speed', 'Consistency', 'Adaptability', 'Teamwork', 'Intelligence', 'Imaginative'].map(label => ({
                        label, value: levels[Math.floor(Math.random() * 3) + 1]
                    }));
                    setScanResult({ name: scanName, stats: initialStats, rank: "A", assessment: "Waiting for tactical analysis..." });
                    setIsScanning(false);
                }, 2000);
            };

            const updateStat = (label, newValue) => {
                const newStats = scanResult.stats.map(s => s.label === label ? { ...s, value: newValue } : s);
                setScanResult({ ...scanResult, stats: newStats });
            };

            const applyTacticalAnalysis = () => {
                setIsAnalyzing(true);
                setTimeout(() => {
                    const shuffled = [...scanResult.stats].sort(() => 0.5 - Math.random());
                    const selected = shuffled.slice(0, 3);
                    const sentences = selected.map(s => sentenceBank[s.value][Math.floor(Math.random() * 4)]);
                    setScanResult({ ...scanResult, assessment: sentences.join(" ") });
                    setIsAnalyzing(false);
                }, 1500);
            };

            return (
                <motion.div initial={{ opacity: 0, y: 50 }} animate={{ opacity: 1, y: 0 }} exit={{ opacity: 0, y: -50 }} className="min-h-screen py-32 max-w-7xl mx-auto px-8 relative">
                    <MagicCircle type={2} /> {/* HUD Core for Scanner */}
                    
                    <button onClick={() => setPage('home')} className="fixed top-8 right-8 z-[100] flex items-center gap-2 text-[#FACC15] font-mono text-[10px] uppercase tracking-widest hover:scale-105 transition-all bg-black/50 p-3 rounded-lg border border-[#FACC15]/20 backdrop-blur-md">
                        <Icon name="arrow-left" className="w-4 h-4" /> Return to Center
                    </button>
                    
                    <div className="relative z-10 space-y-8">
                        <h2 className="text-5xl font-black text-white uppercase tracking-tighter">TACTICAL <span className="text-[#FACC15]">SCANNER</span></h2>
                        <div className="flex gap-4">
                            <input type="text" placeholder="Operator Name..." className="flex-1 bg-[#1a1a1a]/60 backdrop-blur-md border border-gray-800 p-4 rounded-xl text-white outline-none focus:border-[#FACC15]" value={scanName} onChange={e => setScanName(e.target.value)} />
                            <button onClick={handleScan} className="bg-[#FACC15] text-black px-8 rounded-xl font-black uppercase tracking-widest">Scan</button>
                        </div>
                        {isScanning && <div className="py-20 flex flex-col items-center justify-center space-y-4"><motion.div animate={{ rotate: 360 }} transition={{ duration: 2, repeat: Infinity, ease: "linear" }} className="w-16 h-16 border-2 border-dashed border-[#FACC15] rounded-full flex items-center justify-center"><Icon name="fingerprint" className="w-8 h-8 text-[#FACC15]" /></motion.div><p className="text-[#FACC15] font-mono text-[10px] uppercase animate-pulse">Analyzing...</p></div>}
                        {scanResult && !isScanning && (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8 bg-[#1a1a1a]/60 backdrop-blur-md p-8 rounded-3xl border border-gray-800">
                                <div className="space-y-6">
                                    <div className="flex justify-between items-center bg-black/40 p-6 rounded-2xl border border-gray-800 text-glow">
                                        <div><p className="text-[10px] font-mono text-gray-500 uppercase">Target Identified</p><h3 className="text-3xl font-black text-white uppercase">{scanResult.name}</h3></div>
                                        <div className="w-16 h-16 border-2 border-[#FACC15] rounded-xl flex items-center justify-center text-3xl font-black text-[#FACC15]">{scanResult.rank}</div>
                                    </div>
                                    <div className="space-y-4">
                                        {scanResult.stats.map((s, i) => (
                                            <div key={i} className="space-y-2 border-b border-gray-800/50 pb-2">
                                                <div className="flex justify-between items-center"><span className="text-[8px] font-mono text-gray-500 uppercase">{s.label}</span><span className={`text-[8px] font-mono font-bold ${s.value === 'MAX' ? 'text-cyan-400' : 'text-[#FACC15]'}`}>{s.value}</span></div>
                                                <div className="flex gap-1">
                                                    {['LOW', 'MEDIUM', 'HIGH', 'MAX'].map(lvl => (
                                                        <button key={lvl} onClick={() => updateStat(s.label, lvl)} className={`flex-1 text-[7px] font-mono py-1 rounded border transition-all ${s.value === lvl ? 'bg-[#FACC15] border-[#FACC15] text-black font-bold' : 'bg-transparent border-gray-800 text-gray-600'}`}>{lvl}</button>
                                                    ))}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                <div className="space-y-6">
                                    <div className="aspect-video bg-black/40 rounded-2xl overflow-hidden relative group"><img src={`https://picsum.photos/seed/${scanResult.name}/600/400`} className="w-full h-full object-cover opacity-40 grayscale group-hover:grayscale-0 transition-all" /></div>
                                    <div className="p-4 bg-black/60 rounded-xl border border-[#FACC15]/20">
                                        <div className="flex justify-between items-center mb-2"><h4 className="text-[10px] font-bold text-[#FACC15] uppercase">Tactical Assessment:</h4><button onClick={applyTacticalAnalysis} disabled={isAnalyzing} className="bg-[#FACC15] text-black px-3 py-1 rounded text-[8px] font-black uppercase">{isAnalyzing ? 'Analyzing...' : 'Apply Analysis'}</button></div>
                                        <p className="text-[11px] text-gray-400 font-mono italic leading-relaxed">"{scanResult.assessment}"</p>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </motion.div>
            );
        };

        const ProfilePage = ({ setPage }) => (
            <motion.div initial={{ opacity: 0, scale: 1.1 }} animate={{ opacity: 1, scale: 1 }} exit={{ opacity: 0, scale: 0.9 }} className="min-h-screen py-32 max-w-7xl mx-auto px-8 relative">
                <MagicCircle type={0} /> {/* Chrono Ring for Profile */}
                
                <button onClick={() => setPage('home')} className="fixed top-8 right-8 z-[100] flex items-center gap-2 text-[#FACC15] font-mono text-[10px] uppercase tracking-widest hover:scale-105 transition-all bg-black/50 p-3 rounded-lg border border-[#FACC15]/20 backdrop-blur-md">
                    <Icon name="arrow-left" className="w-4 h-4" /> Return to Center
                </button>
                
                <div className="grid grid-cols-1 md:grid-cols-2 gap-12 relative z-10">
                    <div className="space-y-8">
                        <h2 className="text-5xl font-black text-white uppercase tracking-tighter text-glow">BIO<span className="text-[#FACC15]">DATA</span></h2>
                        <div className="space-y-4">
                            <div className="bg-black/40 backdrop-blur-md p-6 rounded-2xl border border-white/5"><p className="text-[10px] font-mono text-gray-500 uppercase mb-1">Identity</p><h3 className="text-3xl font-bold text-white">Wahyu Gustian</h3><p className="text-gray-400">26 Years / Tegal Alur, Jakarta Barat</p></div>
                            <div className="bg-black/40 backdrop-blur-md p-6 rounded-2xl border border-white/5"><p className="text-[10px] font-mono text-gray-500 uppercase mb-1">Philosophy</p><p className="text-gray-400 text-sm italic border-l-2 border-[#FACC15] pl-4">"Adaptasi terhadap teknologi adalah kunci relevansi."</p></div>
                        </div>
                    </div>
                    <div className="bg-[#1a1a1a]/60 backdrop-blur-md p-8 rounded-3xl border border-gray-800 space-y-6">
                        <p className="text-[10px] font-mono text-[#FACC15] uppercase tracking-widest">Contact Channels</p>
                        <div className="space-y-4">
                            <a href="tel:083117035721" className="flex items-center gap-4 group"><div className="w-12 h-12 rounded-xl bg-black/40 flex items-center justify-center group-hover:text-[#FACC15] transition-all border border-white/5"><Icon name="smartphone" className="w-5 h-5" /></div><div><p className="text-[10px] text-gray-600 uppercase">Phone</p><p className="text-white font-bold">083117035721</p></div></a>
                            <a href="mailto:wgustian331@gmail.com" className="flex items-center gap-4 group"><div className="w-12 h-12 rounded-xl bg-black/40 flex items-center justify-center group-hover:text-[#FACC15] transition-all border border-white/5"><Icon name="mail" className="w-5 h-5" /></div><div><p className="text-[10px] text-gray-600 uppercase">Email</p><p className="text-white font-bold">wgustian331@gmail.com</p></div></a>
                        </div>
                    </div>
                </div>
            </motion.div>
        );

        function App() {
            const [page, setPage] = useState('home');
            const [isBooting, setIsBooting] = useState(true);
            const [homeAnimType, setHomeAnimType] = useState(0);

            useEffect(() => {
                setHomeAnimType(Math.floor(Math.random() * 4));
            }, [page]);

            return (
                <div className="min-h-screen bg-[#0a0a0a] text-gray-200 selection:bg-[#FACC15] selection:text-black">
                    <AnimatePresence>{isBooting && <GridReveal onComplete={() => setIsBooting(false)} />}</AnimatePresence>
                    
                    <main>
                        {!isBooting && (
                            <AnimatePresence mode="wait">
                                {page === 'home' && <HomePage key="home" animType={homeAnimType} setPage={setPage} />}
                                {page === 'experience' && <ExperiencePage key="exp" setPage={setPage} />}
                                {page === 'audit' && <AuditToolPage key="audit" setPage={setPage} />}
                                {page === 'profile' && <ProfilePage key="profile" setPage={setPage} />}
                            </AnimatePresence>
                        )}
                    </main>
                    
                    <div className="fixed inset-0 pointer-events-none z-[-1] opacity-5">
                        <div className="absolute inset-0 bg-[linear-gradient(90deg,#FACC15_1px,transparent_1px),linear-gradient(180deg,#FACC15_1px,transparent_1px)] [background-size:80px_80px]"></div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
