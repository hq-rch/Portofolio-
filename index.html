<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wahyu Gustian | Mystic & ARGB Portfolio</title>
    
    <!-- Config Tailwind dinamis -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        app: 'var(--bg-app)',
                        card: 'var(--bg-card)',
                        cardsolid: 'var(--bg-solid)',
                        primary: 'rgb(var(--c-primary) / <alpha-value>)',
                        sec: 'rgb(var(--c-sec) / <alpha-value>)',
                        main: 'var(--t-main)',
                        mute: 'var(--t-mute)',
                        dim: 'var(--t-dim)',
                    },
                    boxShadow: {
                        'glow-p': '0 0 20px rgb(var(--c-primary) / 0.4)',
                        'glow-p-lg': '0 0 40px rgb(var(--c-primary) / 0.6)',
                        'glow-s': '0 0 20px rgb(var(--c-sec) / 0.4)',
                        'glow-s-lg': '0 0 40px rgb(var(--c-sec) / 0.6)',
                    },
                    dropShadow: {
                        'glow': '0 0 10px rgb(var(--c-primary) / 0.8)',
                        'glow-s': '0 0 10px rgb(var(--c-sec) / 0.8)',
                    }
                }
            }
        }
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* CSS VARIABLES: MYSTIC DARK */
        :root {
            --bg-app: #070410;
            --bg-card: rgba(13, 6, 26, 0.6);
            --bg-solid: #0D061A;
            --c-primary: 168 85 247; /* #A855F7 */
            --c-sec: 45 212 191;     /* #2DD4BF */
            --t-main: #ffffff;
            --t-mute: #9ca3af;
            --t-dim: #6b7280;
        }

        /* CSS VARIABLES: ARGB LIGHT */
        .theme-argb {
            --bg-app: #f1f5f9;
            --bg-card: rgba(255, 255, 255, 0.7);
            --bg-solid: #ffffff;
            --c-primary: 255 0 102;  /* Pink pekat base RGB */
            --c-sec: 0 204 255;      /* Cyan pekat base RGB */
            --t-main: #0f172a;
            --t-mute: #475569;
            --t-dim: #94a3b8;
        }

        body { 
            background-color: var(--bg-app); 
            color: var(--t-main); 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            overflow-x: hidden; 
            transition: background-color 0.5s ease, color 0.5s ease;
        }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--bg-app); }
        ::-webkit-scrollbar-thumb { background: rgb(var(--c-primary)); border-radius: 10px; }
        
        /* Animasi ARGB */
        .theme-argb .argb-animate { animation: rgbCycle 4s linear infinite; }
        @keyframes rgbCycle {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }

        /* Animasi Bouncing Dots buat loading AI */
        .typing-indicator {
            display: flex; align-items: center; gap: 4px; padding: 5px;
        }
        .typing-dot {
            width: 6px; height: 6px; background-color: var(--t-main); border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); opacity: 0.3; }
            40% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const motion = window.Motion.motion;
        const AnimatePresence = window.Motion.AnimatePresence;

        const Icon = ({ name, className }) => {
            useEffect(() => { if(window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        // --- KOMPONEN LOGO CYBER HEXAGON ---
        const AILogo = () => (
            <div className="relative flex justify-center items-center w-28 h-28 mb-6 argb-animate">
                <motion.div animate={{ scale: [1, 1.3, 1], opacity: [0.2, 0.5, 0.2] }} transition={{ duration: 4, repeat: Infinity, ease: "easeInOut" }} className="absolute inset-0 bg-gradient-to-tr from-primary to-sec rounded-full blur-2xl" />
                
                <motion.div animate={{ rotate: [0, 360] }} transition={{ duration: 15, repeat: Infinity, ease: "linear" }} className="absolute w-24 h-24 text-primary drop-shadow-glow flex justify-center items-center">
                    <svg viewBox="0 0 100 100" fill="none" stroke="currentColor" strokeWidth="2">
                        <polygon points="50,5 89,27 89,72 50,95 11,72 11,27" />
                        <polygon points="50,15 80,32 80,68 50,85 20,68 20,32" className="text-sec" strokeWidth="1.5" strokeDasharray="4 4" />
                    </svg>
                </motion.div>
                
                <motion.div animate={{ rotate: [360, 0] }} transition={{ duration: 8, repeat: Infinity, ease: "linear" }} className="absolute w-28 h-28 border border-dashed border-sec/40 rounded-full" />

                <motion.div animate={{ scale: [0.8, 1.2, 0.8], opacity: [0.8, 1, 0.8] }} transition={{ duration: 2, repeat: Infinity }} className="absolute w-5 h-5 bg-gradient-to-tr from-primary to-sec rounded-sm rotate-45 shadow-[0_0_15px_rgb(var(--c-sec))]" />
            </div>
        );

        // --- LAYAR LOADING BOOTING ---
        const BootSequence = ({ onComplete }) => (
            <motion.div initial={{ opacity: 1 }} animate={{ opacity: 0 }} transition={{ duration: 1, delay: 2.5 }} onAnimationComplete={onComplete} className="fixed inset-0 z-[200] flex flex-col items-center justify-center bg-app">
                <AILogo />
                <motion.p animate={{ opacity: [0.3, 1, 0.3] }} transition={{ duration: 1.5, repeat: Infinity }} className="text-primary font-mono text-[10px] tracking-[0.5em] mt-4 argb-animate drop-shadow-glow text-center">
                    SYSTEM INITIALIZATION
                </motion.p>
                <div className="absolute inset-0 pointer-events-none grid grid-cols-4 md:grid-cols-8 grid-rows-8 opacity-20">
                    {[...Array(64)].map((_, i) => (
                        <motion.div key={i} initial={{ opacity: 1 }} animate={{ opacity: 0 }} transition={{ duration: 0.5, delay: Math.random() * 2 }} className="bg-primary/10 border border-primary/5 argb-animate" />
                    ))}
                </div>
            </motion.div>
        );

        // --- AI CHATBOT REACT COMPONENT (FORMAL ROLE) ---
        const AIChatbot = () => {
            const [isOpen, setIsOpen] = useState(false);
            const [messages, setMessages] = useState([
                { sender: 'ai', text: 'Selamat datang. Saya Ode, AI Asisten di sistem portofolio ini. Silakan sampaikan pertanyaan Anda.' }
            ]);
            const [input, setInput] = useState('');
            const [isTyping, setIsTyping] = useState(false);
            const chatEndRef = useRef(null);

            const scrollToBottom = () => { chatEndRef.current?.scrollIntoView({ behavior: "smooth" }); };
            useEffect(() => { scrollToBottom(); }, [messages, isTyping, isOpen]);

            const handleSend = async () => {
                if(!input.trim()) return;
                const userText = input.trim();
                
                const newMessages = [...messages, { sender: 'user', text: userText }];
                setMessages(newMessages);
                setInput('');
                setIsTyping(true);

                const chatHistory = newMessages.slice(-4).map(m => 
                    `${m.sender === 'ai' ? 'Ode' : 'Pengguna'}: ${m.text}`
                ).join('\n');

                const websiteContext = `
                INFORMASI SISTEM PORTOFOLIO:
                - Nama Kandidat: Wahyu Gustian (26 Tahun, Domisili: Jakarta Barat).
                - Filosofi Profesional: "Adaptasi terhadap teknologi adalah kunci relevansi."
                - Riwayat Pekerjaan ('Field Records'):
                  1. PT Biggy Cemerlang (2025-2026): Helper Mesin Fanuc (Mengelola output mesin injection, pengepakan presisi).
                  2. PT Kejar (2022-2023): Satpam Pengawalan (Sterilisasi area dan pengawalan teknisi ATM).
                  3. Alfamart (2020-2021): Crew Store (Operasional dan inventarisasi gerai).
                  4. Grab Indonesia (2018-2023): Logistik Perkotaan (Mitra Pengemudi).
                - Menu 'Candidate Scanner': Fitur interaktif berbasis AI untuk melakukan simulasi penilaian kompetensi kandidat kerja.
                - Informasi Kontak ('Bio & Contact'): Telepon/WhatsApp (083117035721), Email (wgustian331@gmail.com).
                `;

                const systemPrompt = `Anda adalah 'Ode', Asisten Virtual di situs portofolio profesional Wahyu Gustian.
                Tugas Anda: Membantu pengunjung (terutama Perekrut atau Tim HRD) dalam mendapatkan informasi dari situs ini, serta menjawa pertanyaan user dengan fleksibel.
                
                ${websiteContext}
                
                INSTRUKSI WAJIB: 
                1. Gunakan Bahasa Indonesia yang formal, dan, sopan.
                2. Jawab dengan ringkas dan terstruktur, serta jawab semua pertanyaan dengan fleksibel 
                3. Jika pengguna memerlukan informasi lebih spesifik, arahkan mereka ke fitur yang tersedia di situs ini.
                
                Riwayat Obrolan:
                ${chatHistory}
                
                Ode:`;

                try {
                    const res = await fetch(`https://text.pollinations.ai/${encodeURIComponent(systemPrompt)}`);
                    const reply = await res.text();
                    setMessages(prev => [...prev, { sender: 'ai', text: reply }]);
                } catch(e) {
                    setMessages(prev => [...prev, { sender: 'ai', text: 'Mohon maaf, sistem sedang mengalami gangguan koneksi. Silakan ulangi pertanyaan Anda.' }]);
                }
                setIsTyping(false);
            };

            const clearChat = () => {
                setMessages([{ sender: 'ai', text: 'Sesi obrolan telah direset. Ada hal lain yang ingin Anda tanyakan?' }]);
            };

            return (
                <div className="fixed z-[150] bottom-4 right-4 sm:bottom-8 sm:right-8 flex flex-col items-end">
                    
                    <AnimatePresence>
                        {isOpen && (
                            <motion.div initial={{ opacity: 0, y: 20, scale: 0.9 }} animate={{ opacity: 1, y: 0, scale: 1 }} exit={{ opacity: 0, y: 20, scale: 0.9 }} 
                                className="bg-card backdrop-blur-xl border border-primary/40 w-[90vw] sm:w-[380px] h-[500px] mb-4 rounded-2xl shadow-glow-p overflow-hidden flex flex-col argb-animate">
                                
                                {/* Header */}
                                <div className="bg-cardsolid/80 p-4 border-b border-primary/20 flex justify-between items-center">
                                    <div className="flex items-center gap-2">
                                        <div className="w-2 h-2 bg-sec rounded-full animate-pulse shadow-glow-s"></div>
                                        <h3 className="font-mono text-sm font-bold text-main">AI Assistant</h3>
                                    </div>
                                    <div className="flex gap-3 text-mute">
                                        <button onClick={clearChat} className="hover:text-main transition-colors" title="Hapus Obrolan"><Icon name="trash-2" className="w-4 h-4"/></button>
                                        <button onClick={() => setIsOpen(false)} className="hover:text-sec transition-colors" title="Tutup"><Icon name="x" className="w-4 h-4"/></button>
                                    </div>
                                </div>

                                {/* Body */}
                                <div className="flex-1 overflow-y-auto p-4 space-y-4 scrollbar-thin">
                                    {messages.map((msg, idx) => (
                                        <div key={idx} className={`flex ${msg.sender === 'user' ? 'justify-end' : 'justify-start'}`}>
                                            <div className={`max-w-[85%] p-3 text-sm rounded-2xl ${msg.sender === 'user' ? 'bg-gradient-to-r from-primary to-sec text-white rounded-br-none shadow-glow-p' : 'bg-cardsolid border border-primary/20 text-main rounded-bl-none'}`}>
                                                {msg.text}
                                            </div>
                                        </div>
                                    ))}
                                    {isTyping && (
                                        <div className="flex justify-start">
                                            <div className="max-w-[85%] p-4 text-sm rounded-2xl bg-cardsolid border border-primary/20 text-main rounded-bl-none">
                                                <div className="typing-indicator">
                                                    <div className="typing-dot"></div>
                                                    <div className="typing-dot"></div>
                                                    <div className="typing-dot"></div>
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                    <div ref={chatEndRef} />
                                </div>

                                {/* Input */}
                                <div className="p-3 bg-cardsolid/80 border-t border-primary/20 flex gap-2">
                                    <input 
                                        type="text" 
                                        value={input}
                                        onChange={e => setInput(e.target.value)}
                                        onKeyPress={e => e.key === 'Enter' && handleSend()}
                                        placeholder="Ketik pertanyaan di sini..." 
                                        className="flex-1 bg-card border border-primary/30 rounded-xl px-4 py-2 text-sm text-main outline-none focus:border-sec transition-colors"
                                    />
                                    <button onClick={handleSend} className="bg-primary/20 hover:bg-primary/50 text-primary hover:text-white border border-primary/50 rounded-xl px-3 transition-all flex items-center justify-center">
                                        <Icon name="send" className="w-4 h-4" />
                                    </button>
                                </div>
                            </motion.div>
                        )}
                    </AnimatePresence>

                    {/* FLOATING BUTTON */}
                    <button onClick={() => setIsOpen(!isOpen)} className="w-14 h-14 bg-cardsolid border-2 border-primary rounded-full flex items-center justify-center text-primary hover:text-sec hover:border-sec hover:scale-110 transition-all shadow-glow-p argb-animate">
                        {isOpen ? <Icon name="x" className="w-6 h-6" /> : <Icon name="bot" className="w-6 h-6" />}
                    </button>
                </div>
            );
        };

        // --- MAGIC CIRCLE ENGINE ---
        const MagicCircle = ({ type }) => {
            if (type === 0) return (
                <div className="absolute inset-0 flex items-center justify-center overflow-hidden pointer-events-none opacity-40 argb-animate">
                    <div className="relative w-[600px] h-[600px] flex items-center justify-center">
                        <motion.div animate={{ rotate: 360 }} transition={{ duration: 30, repeat: Infinity, ease: "linear" }} className="absolute inset-0 border border-dashed border-primary rounded-full shadow-glow-p" />
                        <motion.div animate={{ rotate: -360 }} transition={{ duration: 25, repeat: Infinity, ease: "linear" }} className="absolute inset-12 border-2 border-sec/40 rounded-full shadow-glow-s" />
                        <motion.div animate={{ rotate: 360 }} transition={{ duration: 20, repeat: Infinity, ease: "linear" }} className="absolute inset-24 border border-primary/60 rounded-full border-t-4 shadow-glow-p-lg" />
                    </div>
                </div>
            );
            if (type === 1) return (
                <div className="absolute inset-0 flex items-center justify-center overflow-hidden pointer-events-none opacity-40 argb-animate">
                    <motion.div animate={{ rotate: 360 }} transition={{ duration: 45, repeat: Infinity, ease: "linear" }} className="relative w-[550px] h-[550px]">
                        <div className="absolute inset-0 border border-primary/30 rounded-full shadow-glow-p" />
                        {[...Array(8)].map((_, i) => (
                            <motion.div key={i} style={{ rotate: `${i * 45}deg` }} className="absolute inset-0 flex justify-center">
                                <div className="w-3 h-3 bg-sec rounded-full mt-[-6px] shadow-glow-s" />
                            </motion.div>
                        ))}
                        <div className="absolute inset-16 border border-dashed border-primary/40 rounded-full" />
                    </motion.div>
                </div>
            );
            if (type === 2) return (
                <div className="absolute inset-0 flex items-center justify-center overflow-hidden pointer-events-none opacity-50 argb-animate">
                    <div className="relative w-[500px] h-[500px]">
                        <motion.div animate={{ rotate: 360 }} transition={{ duration: 10, repeat: Infinity, ease: "linear" }} className="absolute inset-0 border-[8px] border-transparent border-t-primary border-b-sec rounded-full blur-[2px] shadow-glow-p-lg" />
                        <motion.div animate={{ rotate: -360 }} transition={{ duration: 15, repeat: Infinity, ease: "linear" }} className="absolute inset-8 border border-primary/40 rounded-full" />
                        <motion.div animate={{ scale: [1, 1.2, 1], opacity: [0.5, 1, 0.5] }} transition={{ duration: 4, repeat: Infinity }} className="absolute inset-[40%] bg-gradient-to-tr from-primary/30 to-sec/30 rounded-full blur-xl" />
                    </div>
                </div>
            );
            return (
                <div className="absolute inset-0 flex items-center justify-center overflow-hidden pointer-events-none opacity-30 argb-animate">
                    {[...Array(3)].map((_, i) => (
                        <motion.div key={i} initial={{ scale: 0.5, opacity: 0 }} animate={{ scale: [0.5, 1.8], opacity: [0, 1, 0] }} transition={{ duration: 6, repeat: Infinity, delay: i * 2, ease: "easeInOut" }} className="absolute w-[600px] h-[600px] border border-primary rotate-45 shadow-glow-p" />
                    ))}
                    <div className="absolute w-[300px] h-[300px] border border-sec/40 rounded-full animate-pulse shadow-glow-s" />
                </div>
            );
        };

        const HomePage = ({ animType, setPage }) => (
            <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} className="min-h-screen flex flex-col items-center justify-center max-w-7xl mx-auto px-8 relative">
                <MagicCircle type={animType} />
                
                <div className="hidden lg:block absolute inset-0 pointer-events-none argb-animate">
                    <div className="absolute top-20 left-20 w-32 h-32 border-t-2 border-l-2 border-primary/30 shadow-glow-p" />
                    <div className="absolute top-20 right-20 w-32 h-32 border-t-2 border-r-2 border-sec/30 shadow-glow-s" />
                    <div className="absolute bottom-20 left-20 w-32 h-32 border-b-2 border-l-2 border-sec/30 shadow-glow-s" />
                    <div className="absolute bottom-20 right-20 w-32 h-32 border-b-2 border-r-2 border-primary/30 shadow-glow-p" />
                </div>

                <div className="text-center space-y-6 relative z-10">
                    <motion.div initial={{ y: 20, opacity: 0 }} animate={{ y: 0, opacity: 1 }} transition={{ delay: 0.2 }} className="flex flex-col items-center">
                        
                        <AILogo />

                        <div className="flex items-center gap-4 argb-animate mb-6 mt-[-10px]">
                            <div className="w-12 h-[1px] bg-gradient-to-r from-transparent to-primary" />
                            <p className="text-[12px] font-mono text-primary uppercase tracking-[0.8em] font-bold drop-shadow-glow">Portfolio v5.0</p>
                            <div className="w-12 h-[1px] bg-gradient-to-l from-transparent to-primary" />
                        </div>
                        
                        <h2 className="text-7xl md:text-9xl font-black text-main uppercase tracking-tighter leading-none">
                            WAHYU<br />
                            <span className="bg-clip-text text-transparent bg-gradient-to-r from-primary to-sec argb-animate drop-shadow-glow">GUSTIAN</span>
                        </h2>
                        
                        <motion.p initial={{ opacity: 0 }} animate={{ opacity: 1 }} transition={{ delay: 0.5 }} className="text-mute text-[10px] md:text-xs font-mono uppercase tracking-[0.3em] max-w-xl mx-auto mt-6 leading-relaxed">
                            Adaptasi cepat dengan integritas mutlak, mengotomatisasi keamanan melalui ketangguhan fisik dan mental.
                        </motion.p>
                    </motion.div>

                    <motion.div initial={{ y: 30, opacity: 0 }} animate={{ y: 0, opacity: 1 }} transition={{ delay: 0.8 }} className="grid grid-cols-1 md:grid-cols-3 gap-6 pt-16 max-w-5xl mx-auto">
                        {[
                            { label: 'Field Records', page: 'experience', icon: 'briefcase' },
                            { label: 'Candidate Scanner', page: 'audit', icon: 'scan-face' },
                            { label: 'Bio & Contact', page: 'profile', icon: 'user' }
                        ].map((item, i) => (
                            <button key={i} onClick={() => setPage(item.page)} className="bg-card backdrop-blur-md border border-primary/20 p-8 rounded-xl hover:border-primary/60 transition-all group relative overflow-hidden text-left hover:shadow-glow-p mt-4 sm:mt-0">
                                <div className="absolute inset-0 bg-primary/5 opacity-0 group-hover:opacity-100 transition-opacity argb-animate" />
                                <div className="flex items-center justify-between mb-6 relative z-10 argb-animate">
                                    <Icon name={item.icon} className="w-6 h-6 text-primary group-hover:text-sec group-hover:scale-110 transition-all" />
                                    <div className="w-2 h-2 bg-main/20 rounded-full group-hover:bg-sec group-hover:shadow-glow-s animate-pulse" />
                                </div>
                                <p className="text-main font-black uppercase tracking-[0.2em] text-sm mb-4 transition-colors relative z-10">{item.label}</p>
                                
                                <div className="h-[2px] w-full bg-primary/10 overflow-hidden rounded-full relative z-10">
                                    <div className="h-full w-0 bg-gradient-to-r from-primary to-sec group-hover:w-full transition-all duration-500 ease-out" />
                                </div>
                            </button>
                        ))}
                    </motion.div>
                </div>
            </motion.div>
        );

        const ExperiencePage = ({ setPage }) => (
            <motion.div initial={{ opacity: 0, x: -50 }} animate={{ opacity: 1, x: 0 }} exit={{ opacity: 0, x: 50 }} className="min-h-screen py-32 max-w-5xl mx-auto px-8 relative">
                <MagicCircle type={1} />
                
                <button onClick={() => setPage('home')} className="fixed top-4 right-4 sm:top-8 sm:right-8 z-[100] flex items-center gap-2 text-primary font-mono text-[10px] uppercase tracking-widest hover:text-sec transition-colors bg-cardsolid/80 p-3 rounded-lg border border-primary/30 backdrop-blur-md argb-animate">
                    <Icon name="arrow-left" className="w-4 h-4" /> <span className="hidden sm:inline">Return to Center</span>
                </button>
                
                <div className="relative z-10 space-y-12 mt-8 sm:mt-0">
                    <div className="flex items-end gap-4">
                        <h2 className="text-5xl font-black text-main uppercase tracking-tighter leading-none">FIELD<br /><span className="text-primary argb-animate drop-shadow-glow">RECORDS</span></h2>
                        <div className="h-1 flex-grow bg-gradient-to-r from-app to-primary/50 mb-2 rounded-r-full argb-animate" />
                    </div>
                    <div className="space-y-12">
                        {[
                            { title: "Helper Mesin Fanuc", company: "PT Biggy Cemerlang", year: "2025 — 2026", desc: "Manajemen output produk mesin injection Fanuc. Pengepakan presisi dan kontrol kualitas harian." },
                            { title: "Satpam Pengawalan", company: "PT Kejar", year: "2022 — 2023", desc: "Pengawalan teknisi perbaikan mesin ATM dan proses sterilisasi area operasional keamanan." },
                            { title: "Crew Store", company: "Alfamart", year: "2020 — 2021", desc: "Manajemen operasional harian gerai dan pengawasan inventaris barang masuk/keluar." },
                            { title: "Mitra Pengemudi Ojol", company: "Grab Indonesia", year: "2018 — 2023", desc: "Pelayanan logistik perkotaan dan distribusi secara mandiri." }
                        ].map((exp, i) => (
                            <div key={i} className="group relative pl-12 border-l border-primary/30 hover:border-primary transition-colors argb-animate">
                                <div className="absolute -left-[5px] top-0 w-2 h-2 bg-sec rounded-full group-hover:scale-150 group-hover:shadow-glow-s transition-all" />
                                <div className="space-y-2">
                                    <div className="flex justify-between items-start">
                                        <div><h3 className="text-2xl font-bold text-main uppercase">{exp.title}</h3><p className="text-primary font-mono text-xs uppercase">{exp.company}</p></div>
                                        <span className="text-[10px] font-mono text-dim uppercase">{exp.year}</span>
                                    </div>
                                    <p className="text-mute text-sm leading-relaxed max-w-xl italic">"{exp.desc}"</p>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            </motion.div>
        );

        // --- KOMPONEN TOOL SCANNER TERINTEGRASI AI ---
        const AuditToolPage = ({ setPage }) => {
            const [scanName, setScanName] = useState('');
            const [scanResult, setScanResult] = useState(null);
            const [isAnalyzing, setIsAnalyzing] = useState(false);

            const handleScan = () => {
                if (!scanName.trim()) return;
                const initialStats = ['Kedisiplinan', 'Integritas', 'Kerjasama Tim', 'Kecerdasan', 'Kecepatan', 'Adaptabilitas', 'Konsistensi', 'Problem Solving'].map(label => ({
                    label, value: null
                }));
                setScanResult({ name: scanName, stats: initialStats, rank: "-", assessment: "Menunggu parameter diisi..." });
            };

            const handleKeyDown = (e) => { if(e.key === 'Enter') handleScan(); };

            const updateStat = (label, newValue) => {
                if(!scanResult) return;
                const newStats = scanResult.stats.map(s => s.label === label ? { ...s, value: newValue } : s);
                setScanResult({ ...scanResult, stats: newStats, rank: "-", assessment: "Parameter berubah. Membutuhkan analisis ulang." });
            };

            const applyTacticalAnalysis = async () => {
                if(!scanResult) return;
                const answeredStats = scanResult.stats.filter(s => s.value !== null);
                if (answeredStats.length === 0) {
                    setScanResult({ ...scanResult, assessment: "PERINGATAN: Tidak ada parameter yang dipilih. Silakan isi data." });
                    return;
                }

                setIsAnalyzing(true);
                setScanResult({ ...scanResult, assessment: "Memproses analisis menggunakan sistem AI..." });

                // Kalkulasi Rank Visual
                let score = 0;
                answeredStats.forEach(s => {
                    if(s.value === 'MAX') score += 4;
                    else if(s.value === 'HIGH') score += 3;
                    else if(s.value === 'MEDIUM') score += 2;
                    else if(s.value === 'LOW') score += 1;
                });
                
                const avg = score / answeredStats.length;
                let calculatedRank = 'D';
                if (avg >= 3.5) calculatedRank = 'S';
                else if (avg >= 2.8) calculatedRank = 'A';
                else if (avg >= 2.0) calculatedRank = 'B';
                else if (avg >= 1.5) calculatedRank = 'C';

                // Prompt untuk AI Text Generation (Keluaran Langsung)
                const statsString = answeredStats.map(s => `${s.label}: ${s.value}`).join(", ");
                const aiPrompt = `Tindak bertindak sebagai Manajer HRD profesional. Buatlah evaluasi kinerja untuk kandidat bernama "${scanResult.name}" berdasarkan metrik berikut: ${statsString}. Berikan kesimpulan singkat yang sangat formal, menggunakan bahasa Indonesia baku, tidak bertele-tele, maksimal 3 kalimat dan JANGAN mengulangi memyebutkan nilai metrik (seperti "MAX", "HIGHT", DLL, atau daftar kategori di dalam jawaban.`;

                try {
                    const res = await fetch(`https://text.pollinations.ai/${encodeURIComponent(aiPrompt)}`);
                    const aiAssessment = await res.text();
                    setScanResult({ ...scanResult, rank: calculatedRank, assessment: aiAssessment });
                } catch (error) {
                    setScanResult({ ...scanResult, rank: calculatedRank, assessment: "Sistem AI sedang sibuk. Namun secara kalkulasi sistem dasar, kandidat ini berada di peringkat " + calculatedRank + "." });
                } finally {
                    setIsAnalyzing(false);
                }
            };

            return (
                <motion.div initial={{ opacity: 0, y: 50 }} animate={{ opacity: 1, y: 0 }} exit={{ opacity: 0, y: -50 }} className="min-h-screen py-24 sm:py-32 max-w-7xl mx-auto px-4 sm:px-8 relative">
                    <MagicCircle type={2} />
                    
                    <button onClick={() => setPage('home')} className="fixed top-4 right-4 sm:top-8 sm:right-8 z-[100] flex items-center gap-2 text-primary font-mono text-[10px] uppercase tracking-widest hover:text-sec transition-colors bg-cardsolid/80 p-3 rounded-lg border border-primary/30 backdrop-blur-md argb-animate">
                        <Icon name="arrow-left" className="w-4 h-4" /> <span className="hidden sm:inline">Return to Center</span>
                    </button>
                    
                    <div className="relative z-10 space-y-8 mt-8 sm:mt-0">
                        <h2 className="text-4xl sm:text-5xl font-black text-main uppercase tracking-tighter">CANDIDATE <span className="text-primary argb-animate drop-shadow-glow">SCANNER</span></h2>
                        
                        <div className="flex flex-col sm:flex-row gap-4">
                            <input 
                                type="text" 
                                placeholder="Masukkan Nama Kandidat..." 
                                className="flex-1 bg-card backdrop-blur-md border border-primary/40 p-4 rounded-xl text-main outline-none focus:border-sec focus:shadow-glow-s transition-all w-full argb-animate" 
                                value={scanName} 
                                onChange={e => setScanName(e.target.value)} 
                                onKeyDown={handleKeyDown}
                            />
                            <button onClick={handleScan} className="bg-primary text-white py-4 px-8 rounded-xl font-black uppercase tracking-widest w-full sm:w-auto hover:opacity-80 transition-opacity argb-animate shadow-glow-p">Scan</button>
                        </div>

                        <AnimatePresence>
                            {scanResult && (
                                <motion.div initial={{ opacity: 0, scale: 0.95 }} animate={{ opacity: 1, scale: 1 }} className="grid grid-cols-1 md:grid-cols-2 gap-6 sm:gap-8 bg-card backdrop-blur-md p-4 sm:p-8 rounded-3xl border border-primary/30 shadow-xl argb-animate">
                                    <div className="space-y-6">
                                        <div className="flex justify-between items-center bg-cardsolid/60 p-4 sm:p-6 rounded-2xl border border-primary/20">
                                            <div className="overflow-hidden pr-2">
                                                <p className="text-[10px] font-mono text-sec uppercase drop-shadow-glow-s">Kandidat Teridentifikasi</p>
                                                <h3 className="text-2xl sm:text-3xl font-black text-main uppercase truncate">{scanResult.name}</h3>
                                            </div>
                                            <div className={`w-12 h-12 sm:w-16 sm:h-16 shrink-0 border-2 rounded-xl flex items-center justify-center text-2xl sm:text-3xl font-black transition-all duration-500 ${scanResult.rank === '-' ? 'border-dim text-dim' : 'border-sec text-sec shadow-glow-s'}`}>
                                                {scanResult.rank}
                                            </div>
                                        </div>
                                        
                                        <div className="space-y-4">
                                            {scanResult.stats.map((s, i) => (
                                                <div key={i} className="space-y-2 border-b border-primary/20 pb-2">
                                                    <div className="flex justify-between items-center">
                                                        <span className="text-[8px] font-mono text-mute uppercase">{s.label}</span>
                                                        <span className={`text-[8px] font-mono font-bold ${s.value === 'MAX' ? 'text-sec drop-shadow-glow-s' : s.value ? 'text-primary' : 'text-dim'}`}>
                                                            {s.value || 'UNLINKED'}
                                                        </span>
                                                    </div>
                                                    <div className="grid grid-cols-2 sm:grid-cols-4 gap-1 sm:gap-2">
                                                        {['LOW', 'MEDIUM', 'HIGH', 'MAX'].map(lvl => (
                                                            <button 
                                                                key={lvl} 
                                                                onClick={() => updateStat(s.label, lvl)} 
                                                                className={`w-full text-[7px] font-mono py-1.5 rounded border transition-all ${
                                                                    s.value === lvl 
                                                                    ? lvl === 'MAX' 
                                                                        ? 'bg-sec border-sec text-app font-bold shadow-glow-s' 
                                                                        : 'bg-primary border-primary text-white font-bold shadow-glow-p' 
                                                                    : 'bg-transparent border-primary/30 text-mute hover:border-primary/80 hover:text-main'
                                                                }`}
                                                            >
                                                                {lvl}
                                                            </button>
                                                        ))}
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="space-y-6">
                                        <div className="aspect-video bg-cardsolid rounded-2xl overflow-hidden relative group border border-primary/20">
                                            <div className="absolute inset-0 bg-primary/20 group-hover:bg-transparent transition-all z-10 mix-blend-overlay"></div>
                                            <img src={`https://picsum.photos/seed/${scanResult.name}/600/400`} className="w-full h-full object-cover opacity-60 grayscale group-hover:grayscale-0 transition-all duration-700" />
                                        </div>
                                        <div className="p-4 bg-cardsolid/80 rounded-xl border border-primary/40 shadow-inner">
                                            <div className="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-3 sm:gap-0 mb-3">
                                                <h4 className="text-[10px] font-bold text-sec uppercase drop-shadow-glow-s">Hasil Evaluasi AI:</h4>
                                                <button 
                                                    onClick={applyTacticalAnalysis} 
                                                    disabled={isAnalyzing} 
                                                    className={`px-3 py-2 sm:py-1 w-full sm:w-auto rounded text-[8px] font-black uppercase transition-all ${isAnalyzing ? 'bg-cardsolid text-dim border border-dim' : 'bg-gradient-to-r from-primary to-sec text-white shadow-glow-p hover:scale-105'}`}
                                                >
                                                    {isAnalyzing ? 'Sedang Memproses...' : 'Analisis Kandidat'}
                                                </button>
                                            </div>
                                            <p className={`text-[11px] font-mono italic leading-relaxed ${scanResult.rank === '-' ? 'text-dim' : 'text-main'}`}>
                                                "{scanResult.assessment}"
                                            </p>
                                        </div>
                                    </div>
                                </motion.div>
                            )}
                        </AnimatePresence>
                    </div>
                </motion.div>
            );
        };

        const ProfilePage = ({ setPage }) => (
            <motion.div initial={{ opacity: 0, scale: 1.1 }} animate={{ opacity: 1, scale: 1 }} exit={{ opacity: 0, scale: 0.9 }} className="min-h-screen py-32 max-w-7xl mx-auto px-8 relative">
                <MagicCircle type={0} />
                
                <button onClick={() => setPage('home')} className="fixed top-4 right-4 sm:top-8 sm:right-8 z-[100] flex items-center gap-2 text-primary font-mono text-[10px] uppercase tracking-widest hover:text-sec transition-colors bg-cardsolid/80 p-3 rounded-lg border border-primary/30 backdrop-blur-md argb-animate">
                    <Icon name="arrow-left" className="w-4 h-4" /> <span className="hidden sm:inline">Return to Center</span>
                </button>
                
                <div className="grid grid-cols-1 md:grid-cols-2 gap-12 relative z-10 mt-8 sm:mt-0">
                    <div className="space-y-8">
                        <h2 className="text-5xl font-black text-main uppercase tracking-tighter">BIO<span className="text-primary argb-animate drop-shadow-glow">DATA</span></h2>
                        <div className="space-y-4">
                            <div className="bg-card backdrop-blur-md p-6 rounded-2xl border border-primary/30 shadow-lg argb-animate">
                                <p className="text-[10px] font-mono text-sec uppercase mb-1 drop-shadow-glow-s">Identitas Pribadi</p>
                                <h3 className="text-3xl font-bold text-main mb-1">Wahyu Gustian</h3>
                                <p className="text-mute font-mono text-sm">26 Tahun / Domisili Jakarta Barat</p>
                            </div>
                            <div className="bg-card backdrop-blur-md p-6 rounded-2xl border border-primary/30 shadow-lg argb-animate">
                                <p className="text-[10px] font-mono text-sec uppercase mb-1 drop-shadow-glow-s">Filosofi Kerja</p>
                                <p className="text-main text-sm italic border-l-2 border-primary pl-4">"Adaptasi terhadap teknologi adalah kunci relevansi."</p>
                            </div>
                        </div>
                    </div>
                    <div className="bg-card backdrop-blur-md p-8 rounded-3xl border border-primary/30 space-y-6 shadow-xl argb-animate">
                        <p className="text-[10px] font-mono text-primary uppercase tracking-widest drop-shadow-glow">Informasi Kontak</p>
                        <div className="space-y-4">
                            <a href="tel:083117035721" className="flex items-center gap-4 group">
                                <div className="w-12 h-12 rounded-xl bg-cardsolid flex items-center justify-center text-mute group-hover:text-sec group-hover:border-sec transition-all border border-primary/30 shadow-inner">
                                    <Icon name="smartphone" className="w-5 h-5" />
                                </div>
                                <div><p className="text-[10px] text-dim uppercase">WhatsApp / Telepon</p><p className="text-main font-bold group-hover:text-sec transition-colors">083117035721</p></div>
                            </a>
                            <a href="mailto:wgustian331@gmail.com" className="flex items-center gap-4 group">
                                <div className="w-12 h-12 rounded-xl bg-cardsolid flex items-center justify-center text-mute group-hover:text-sec group-hover:border-sec transition-all border border-primary/30 shadow-inner">
                                    <Icon name="mail" className="w-5 h-5" />
                                </div>
                                <div><p className="text-[10px] text-dim uppercase">Email Elektronik</p><p className="text-main font-bold group-hover:text-sec transition-colors">wgustian331@gmail.com</p></div>
                            </a>
                        </div>
                    </div>
                </div>
            </motion.div>
        );

        function App() {
            const [page, setPage] = useState('home');
            const [isBooting, setIsBooting] = useState(true);
            const [homeAnimType, setHomeAnimType] = useState(0);
            const [theme, setTheme] = useState('mystic');

            useEffect(() => { setHomeAnimType(Math.floor(Math.random() * 4)); }, [page]);
            useEffect(() => { document.body.className = theme === 'argb' ? 'theme-argb' : ''; }, [theme]);

            return (
                <div className="min-h-screen selection:bg-primary selection:text-white relative overflow-hidden">
                    <AnimatePresence>
                        {isBooting && <BootSequence onComplete={() => setIsBooting(false)} />}
                    </AnimatePresence>
                    
                    {!isBooting && (
                        <button 
                            onClick={() => setTheme(t => t === 'mystic' ? 'argb' : 'mystic')}
                            className="fixed top-4 left-4 z-[100] flex items-center gap-2 text-primary font-mono text-[10px] uppercase tracking-widest hover:text-sec transition-colors bg-cardsolid/80 p-3 rounded-lg border border-primary/30 backdrop-blur-md argb-animate shadow-glow-p"
                        >
                            <Icon name={theme === 'mystic' ? 'aperture' : 'moon'} className="w-4 h-4" /> 
                            <span className="hidden sm:inline">{theme === 'mystic' ? 'ARGB MODE' : 'MYSTIC MODE'}</span>
                        </button>
                    )}

                    <main>
                        {!isBooting && (
                            <AnimatePresence mode="wait">
                                {page === 'home' && <HomePage key="home" animType={homeAnimType} setPage={setPage} />}
                                {page === 'experience' && <ExperiencePage key="exp" setPage={setPage} />}
                                {page === 'audit' && <AuditToolPage key="audit" setPage={setPage} />}
                                {page === 'profile' && <ProfilePage key="profile" setPage={setPage} />}
                            </AnimatePresence>
                        )}
                    </main>

                    {/* RENDER CHATBOT SETELAH LOADING SELESAI */}
                    {!isBooting && <AIChatbot />}
                    
                    <div className="fixed inset-0 pointer-events-none z-[-1] opacity-5 mix-blend-overlay argb-animate">
                        <div className="absolute inset-0 bg-[linear-gradient(90deg,var(--t-main)_1px,transparent_1px),linear-gradient(180deg,var(--t-main)_1px,transparent_1px)] [background-size:80px_80px]"></div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
